<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <!-- Background -->
    <rect width="100" height="100" fill="#1e3a8a" rx="10" />

    <!-- Notice board frame -->
    <rect x="15" y="20" width="70" height="60" fill="#3b82f6" stroke="#0f172a" stroke-width="2" rx="3" />

    <!-- Bulletin pins -->
    <circle cx="25" cy="30" r="4" fill="#fbbf24" />
    <circle cx="75" cy="30" r="4" fill="#fbbf24" />
    <circle cx="25" cy="70" r="4" fill="#fbbf24" />
    <circle cx="75" cy="70" r="4" fill="#fbbf24" />

    <!-- Notice papers -->
    <rect x="20" y="35" width="20" height="25" fill="#fff" stroke="#0f172a" stroke-width="1" rx="2"
        transform="rotate(-5 30 47.5)" />
    <rect x="50" y="32" width="20" height="25" fill="#fef3c7" stroke="#0f172a" stroke-width="1" rx="2"
        transform="rotate(8 60 44.5)" />

    <!-- Text lines on notices (indicating content) -->
    <line x1="23" y1="40" x2="37" y2="40" stroke="#9ca3af" stroke-width="1" />
    <line x1="23" y1="45" x2="37" y2="45" stroke="#9ca3af" stroke-width="1" />
    <line x1="23" y1="50" x2="35" y2="50" stroke="#9ca3af" stroke-width="1" />

    <line x1="53" y1="37" x2="67" y2="37" stroke="#9ca3af" stroke-width="1" />
    <line x1="53" y1="42" x2="67" y2="42" stroke="#9ca3af" stroke-width="1" />
    <line x1="53" y1="47" x2="65" y2="47" stroke="#9ca3af" stroke-width="1" />
</svg>